name: update-senators

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate senators data
        run: npm run gen:senators

      - name: Commit and push if changed
        working-directory: .
        run: |
          set -euo pipefail
          test -f web/public/data/senators.json
          node -e "const a=require('./web/public/data/senators.json'); if(!Array.isArray(a)||a.length===0){process.exit(1)}"
          if [ -z "$(git status --porcelain -- web/public/data/senators.json)" ]; then
            echo "No changes in generated data"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/senators.json
          git commit -m "chore: update senators data"
          git push
