name: update-representatives

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate representatives data
        run: npm run gen:representatives

      - name: Auto-fill missing representative images (v6 missing-only exhaustive batch)
        env:
          REP_IMAGE_CONCURRENCY: "10"
          REP_IMAGE_WAIT_MS: "80"
          REP_IMAGE_TIMEOUT_MS: "12000"
          REP_IMAGE_SEARCH_LIMIT: "10"
          REP_IMAGE_BATCH_LIMIT: "25"
          REP_IMAGE_TARGET_MODE: "missing"
          REP_IMAGE_SKIP_AI_GUESS: "false"
        run: npm run gen:representatives:images


      - name: Auto-fix selected representative images (explicit fix-target batch)
        env:
          REP_IMAGE_CONCURRENCY: "8"
          REP_IMAGE_WAIT_MS: "80"
          REP_IMAGE_TIMEOUT_MS: "12000"
          REP_IMAGE_SEARCH_LIMIT: "10"
          REP_IMAGE_BATCH_LIMIT: "80"
          REP_IMAGE_TARGET_MODE: "fix"
          REP_IMAGE_SKIP_AI_GUESS: "false"
        run: npm run gen:representatives:images

      - name: Generate representative image reports
        run: npm run report:representatives:images

      - name: Validate representatives data
        run: npm run check:representatives

      - name: Check generated file status
        id: changes
        working-directory: .
        run: |
          set -euxo pipefail
          test -f web/public/data/representatives.json
          test -f web/public/data/missing-images.json
          test -f web/public/data/representatives-image-review.json
          test -f web/public/data/representatives-image-search-targets.json
          test -f web/public/data/representatives-image-fix-targets.json

          if [ -z "$(git status --porcelain -- web/public/data/representatives.json web/public/data/missing-images.json web/public/data/representatives-image-review.json web/public/data/representatives-image-search-targets.json web/public/data/representatives-image-search-targets.csv web/public/data/representatives-image-fix-targets.json web/public/data/representatives-image-fix-targets.csv)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit generated file
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/representatives.json \
                  web/public/data/missing-images.json \
                  web/public/data/representatives-image-review.json \
                  web/public/data/representatives-image-search-targets.json \
                  web/public/data/representatives-image-search-targets.csv \
                  web/public/data/representatives-image-fix-targets.json \
                  web/public/data/representatives-image-fix-targets.csv
          git commit -m "auto update representatives data"
          git push
