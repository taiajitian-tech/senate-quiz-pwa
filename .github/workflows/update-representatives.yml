
name: update-representatives

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate representatives data
        run: npm run gen:representatives

      - name: Auto-fill missing representative images
        env:
          REP_IMAGE_CONCURRENCY: "10"
          REP_IMAGE_WAIT_MS: "80"
          REP_IMAGE_TIMEOUT_MS: "12000"
          REP_IMAGE_SEARCH_LIMIT: "12"
        run: node scripts/autoImageFetch.mjs

      - name: Generate representative image reports
        run: npm run report:representatives:images

      - name: Validate representatives data
        run: npm run check:representatives

      - name: Check generated file status
        id: changes
        working-directory: .
        run: |
          set -euxo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated file
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto update representatives data"
          git push
