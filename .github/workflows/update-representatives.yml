name: update-representatives

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer for Yomiuri browser crawl
        run: npm install --no-save puppeteer

      - name: Generate representatives data
        run: npm run gen:representatives

      - name: Normalize all representative images from Yomiuri (all replace)
        env:
          REP_IMAGE_CONCURRENCY: "10"
          REP_IMAGE_WAIT_MS: "80"
          REP_IMAGE_TIMEOUT_MS: "12000"
          REP_IMAGE_SEARCH_LIMIT: "10"
          REP_IMAGE_BATCH_LIMIT: "465"
          REP_IMAGE_TARGET_MODE: "all"
          REP_IMAGE_SKIP_AI_GUESS: "true"
          REP_IMAGE_YOMIURI_ONLY: "true"
          REP_IMAGE_YOMIURI_REPLACE_EXISTING: "true"
          REP_IMAGE_YOMIURI_REBUILD_CACHE: "true"
          REP_IMAGE_YOMIURI_USE_BROWSER: "true"
          REP_IMAGE_YOMIURI_BROWSER_WAIT_MS: "1500"
        run: npm run gen:representatives:images


      - name: Generate representative image reports (after Yomiuri normalize)
        run: npm run report:representatives:images

      - name: Validate representatives data
        run: npm run check:representatives

      - name: Fail if any representative image is still missing after Yomiuri normalize
        working-directory: .
        run: |
          set -euxo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const missing = JSON.parse(fs.readFileSync("web/public/data/missing-images.json", "utf8"));
          if (!Array.isArray(missing)) {
            throw new Error("missing-images.json is not an array");
          }
          if (missing.length > 0) {
            console.error(`Yomiuri normalize incomplete. missing=${missing.length}`);
            for (const item of missing.slice(0, 50)) console.error(`missing: ${item.name}`);
            process.exit(1);
          }
          console.log("Yomiuri normalize complete. missing=0");
          NODE


      - name: Check generated file status
        id: changes
        working-directory: .
        run: |
          set -euxo pipefail
          test -f web/public/data/representatives.json
          test -f web/public/data/missing-images.json
          test -f web/public/data/representatives-image-review.json
          test -f web/public/data/representatives-image-search-targets.json
          test -f web/public/data/representatives-image-fix-targets.json
          test -f web/public/data/image-search-cache.json
          test -f web/public/data/representatives-image-url-cache.json
          test -f web/public/data/representatives-yomiuri-cache.json

          if [ -z "$(git status --porcelain -- web/public/data/representatives.json web/public/data/missing-images.json web/public/data/representatives-image-review.json web/public/data/representatives-image-search-targets.json web/public/data/representatives-image-search-targets.csv web/public/data/representatives-image-fix-targets.json web/public/data/representatives-image-fix-targets.csv web/public/data/image-search-cache.json web/public/data/representatives-image-url-cache.json web/public/data/representatives-yomiuri-cache.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit generated file
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/representatives.json \
                  web/public/data/missing-images.json \
                  web/public/data/representatives-image-review.json \
                  web/public/data/representatives-image-search-targets.json \
                  web/public/data/representatives-image-search-targets.csv \
                  web/public/data/representatives-image-fix-targets.json \
                  web/public/data/representatives-image-fix-targets.csv \
                  web/public/data/image-search-cache.json \
                  web/public/data/representatives-image-url-cache.json \
                  web/public/data/representatives-yomiuri-cache.json
          git commit -m "auto update representatives data"
          git push
