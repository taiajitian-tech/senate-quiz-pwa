name: update-representatives

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate representatives data
        run: npm run gen:representatives

      - name: Generate representative image reports (before image update)
        run: npm run report:representatives:images

      - name: Fill only missing representative images from NHK static sources
        env:
          REP_IMAGE_TARGET_MODE: "missing"
        run: node scripts/fetchNhkWinnersImagesStatic.mjs

      - name: Generate representative image reports (after missing fill)
        run: npm run report:representatives:images

      - name: Replace only bad or distant representative images from NHK static sources
        env:
          REP_IMAGE_TARGET_MODE: "fix"
        run: node scripts/fetchNhkWinnersImagesStatic.mjs

      - name: Generate representative image reports (final)
        run: npm run report:representatives:images

      - name: Validate representatives data
        run: npm run check:representatives

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/representatives.json public/data/representatives-image-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update representative images from NHK static sources"
          git push
