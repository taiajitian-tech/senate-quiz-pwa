name: update-representatives

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3,15 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Snapshot previous data
        run: |
          set -euo pipefail
          mkdir -p .cache/previous-data
          cp -f public/data/senators.json .cache/previous-data/senators.json
          cp -f public/data/ministers.json .cache/previous-data/ministers.json
          cp -f public/data/vice-ministers.json .cache/previous-data/vice-ministers.json
          cp -f public/data/parliamentary-secretaries.json .cache/previous-data/parliamentary-secretaries.json
          cp -f public/data/house-officers.json .cache/previous-data/house-officers.json
          cp -f public/data/councilors-officers.json .cache/previous-data/councilors-officers.json
          cp -f public/data/representatives.json .cache/previous-data/representatives.json

      - name: Generate representatives data
        run: npm run gen:representatives

      - name: Generate representative image reports
        run: npm run report:representatives:images

      - name: Generate updates data
        run: npm run gen:updates

      - name: Validate representatives data
        run: npm run check:representatives

      - name: Guard representative images
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';

          const previous = JSON.parse(fs.readFileSync('.cache/previous-data/representatives.json', 'utf8'));
          const current = JSON.parse(fs.readFileSync('public/data/representatives.json', 'utf8'));

          const previousMap = new Map(previous.map((item) => [item.id, JSON.stringify(item.images ?? [])]));
          const changed = [];

          for (const item of current) {
            const before = previousMap.get(item.id);
            const after = JSON.stringify(item.images ?? []);
            if (before === undefined) continue;
            if (before !== after) changed.push(item.name ?? String(item.id));
          }

          if (changed.length > 0) {
            console.error('Representative images changed:', changed.join(', '));
            process.exit(1);
          }
          EOF

      - name: Commit and push if changed
        working-directory: .
        run: |
          set -euo pipefail
          test -f web/public/data/representatives.json
          test -f web/public/data/updates.json
          node -e "const a=require('./web/public/data/representatives.json'); if(!Array.isArray(a)||a.length===0){process.exit(1)}"
          if [ -z "$(git status --porcelain -- web/public/data/representatives.json web/public/data/updates.json web/public/data/missing-images.json web/public/data/representatives-image-review.json web/public/data/representatives-image-search-targets.json web/public/data/representatives-image-search-targets.csv web/public/data/representatives-image-fix-targets.json web/public/data/representatives-image-fix-targets.csv)" ]; then
            echo "No changes in representatives data"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/representatives.json web/public/data/updates.json web/public/data/missing-images.json web/public/data/representatives-image-review.json web/public/data/representatives-image-search-targets.json web/public/data/representatives-image-search-targets.csv web/public/data/representatives-image-fix-targets.json web/public/data/representatives-image-fix-targets.csv
          git commit -m "chore: update representatives and notices data"
          git push
