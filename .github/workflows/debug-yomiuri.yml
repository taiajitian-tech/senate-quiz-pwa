name: debug-yomiuri

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer
        run: npm install --no-save puppeteer

      - name: Run Yomiuri debug capture
        run: node scripts/debugYomiuriWinners.mjs

      - name: Upload Yomiuri debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yomiuri-debug
          path: yomiuri-debug/
          if-no-files-found: warn
