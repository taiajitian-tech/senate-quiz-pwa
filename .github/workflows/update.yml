name: update-senators

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete proxy || true
          npm config delete https-proxy || true
          rm -rf node_modules
          npm install --no-audit --no-fund

      - name: Generate senators data
        run: node scripts/fetchSenators.mjs

      - name: Validate senators data
        run: node scripts/validateSenators.mjs

      - name: Commit and push if changed
        working-directory: .
        run: |
          set -euo pipefail

          # 生成JSONが無い/空なら失敗（[] 固定化を防止）
          test -f web/public/data/senators.json
          node -e "const a=require('./web/public/data/senators.json'); if(!Array.isArray(a)||a.length===0){process.exit(1)}"

          # 生成物以外はコミットしない（lockは捨てる）
          git checkout -- web/package-lock.json || true

          # 対象ファイルに変更が無ければコミットしない（誤判定防止）
          if [ -z "$(git status --porcelain -- web/public/data/senators.json)" ]; then
            echo "No changes in senators.json"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add web/public/data/senators.json
          git commit -m "chore: update senators.json"
          git push
