name: update-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete proxy || true
          npm config delete https-proxy || true
          rm -rf node_modules
          npm install --no-audit --no-fund

      - name: Generate senators data
        run: node scripts/fetchSenators.mjs

      - name: Generate ministers data
        run: node scripts/fetchMinisters.mjs

      - name: Validate data
        run: npm run check:data

      - name: Commit and push if changed
        working-directory: .
        run: |
          set -euo pipefail
          test -f web/public/data/senators.json
          test -f web/public/data/ministers.json
          node -e "const a=require('./web/public/data/senators.json'); if(!Array.isArray(a)||a.length===0){process.exit(1)}"
          node -e "const a=require('./web/public/data/ministers.json'); if(!Array.isArray(a)||a.length===0){process.exit(1)}"
          git checkout -- web/package-lock.json || true
          if [ -z "$(git status --porcelain -- web/public/data/senators.json web/public/data/ministers.json)" ]; then
            echo "No changes in generated data"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add web/public/data/senators.json web/public/data/ministers.json
          git commit -m "chore: update senators and ministers data"
          git push
