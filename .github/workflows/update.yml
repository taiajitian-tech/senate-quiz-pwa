name: update-senators

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # 毎日12時(JST)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Generate senators data
        working-directory: web
        run: node scripts/fetchSenators.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # package-lock の変更は破棄（Actionsで毎回変わるため）
          git restore web/package-lock.json || true

          # 生成JSONのみステージ
          git add web/public/data/senators.json

          # 差分が無ければ正常終了
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update senators data"
          git push origin main
