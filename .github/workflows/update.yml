name: update-senators

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Generate senators data
        working-directory: web
        run: npm run gen:senators

      - name: Commit and push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com

          # senators.json 以外の変更（例：package-lock.json）は必ず破棄
          git checkout -- web/package-lock.json web/package.json || true

          # senators.json に差分がなければ終了
          if git diff --quiet -- web/public/data/senators.json; then
            echo "No changes in senators.json"
            exit 0
          fi

          git add web/public/data/senators.json
          git commit -m "chore: update senators.json"
          git push origin main
