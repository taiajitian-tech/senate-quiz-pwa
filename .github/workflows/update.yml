name: update-senators

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          # lock不整合で npm ci が落ちるのを防ぐ
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Generate senators data
        run: node scripts/fetchSenators.mjs

      - name: Commit and push if changed
        run: |
          # 生成物以外はコミットしない（lockは捨てる）
          git checkout -- web/package-lock.json || true
          git status --porcelain
          if git diff --quiet -- web/public/data/senators.json; then
            echo "No changes in senators.json"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add web/public/data/senators.json
          git commit -m "chore: update senators.json"
          git push
